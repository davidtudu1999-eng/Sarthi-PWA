<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="theme-color" content="#075E54"/>
<title>Sarthi Login</title>
<style>
:root{--wa:#075E54;--bg:#e5ddd5;--card:#fff;--line:#9cb4aa;--text:#17302b;--btnbg:#dff5ed;}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.wrap{max-width:860px;margin:0 auto;padding:42px 18px 40px;min-height:100vh}
.bubble{background:var(--card);border:2px solid var(--line);padding:18px 20px;font-size:20px;line-height:1.45;max-width:620px}
.form{margin-top:54px}
.input{display:block;width:100%;padding:18px 16px;margin:0 0 34px;border:2px solid var(--line);background:#fff;font-size:22px;color:var(--text);outline:none}
.input::placeholder{color:#a4afa9}
.actions{display:flex;justify-content:center;gap:52px;flex-wrap:wrap;margin-top:30px}
.btn{border:2px solid #7f968d;cursor:pointer;padding:18px 26px;border-radius:16px;font-weight:900;font-size:20px;color:#29423c;background:var(--btnbg);min-width:190px;box-shadow:0 2px 0 rgba(0,0,0,.05)}
.btn:active{transform:translateY(1px)}
.error,.info{margin-top:18px;text-align:center;font-size:16px;font-weight:700}
.error{color:#9b2020}.info{color:#45645d}
@media (max-width:640px){
  .wrap{padding-top:30px}
  .bubble{font-size:18px}
  .input{font-size:19px;margin-bottom:24px;padding:15px 14px}
  .actions{gap:18px}
  .btn{min-width:140px;font-size:18px;padding:15px 22px}
}
</style>
</head>
<body>
  <div class="wrap">
    <div class="bubble">
      <strong>Welcome to Sarthi Module!!</strong><br/><br/>
      Please enter your login credentials
    </div>

    <div class="form">
      <input id="username" class="input" type="text" placeholder="username" autocomplete="username" />
      <input id="pin" class="input" type="password" inputmode="numeric" maxlength="4" placeholder="pin" autocomplete="current-password" />
      <div class="actions">
        <button class="btn" id="submitBtn">Submit</button>
        <button class="btn" id="backBtn">Back</button>
      </div>
      <div id="message" class="error" aria-live="polite"></div>
    </div>
  </div>
<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQrLaHbMvunnTS67OlQTh0RhUjIHzQGzTLNnmdxJQR6ERhFXpSmJ00LbtDxwfa-OQq-YeA6gckOUzgH/pub?gid=0&single=true&output=csv';
const STORAGE_KEY = 'sarthiCurrentUser';

function showMessage(text, isError=true){
  const el = document.getElementById('message');
  el.className = isError ? 'error' : 'info';
  el.textContent = text;
}

function normalize(v){ return String(v || '').trim(); }
function lower(v){ return normalize(v).toLowerCase(); }

function parseCSVLine(line){
  const out = [];
  let cur = '';
  let inQuotes = false;
  for(let i=0;i<line.length;i++){
    const ch = line[i];
    if(ch === '"'){
      if(inQuotes && line[i+1] === '"'){
        cur += '"';
        i++;
      } else {
        inQuotes = !inQuotes;
      }
    } else if(ch === ',' && !inQuotes){
      out.push(cur);
      cur = '';
    } else {
      cur += ch;
    }
  }
  out.push(cur);
  return out;
}

function parseCSV(text){
  const lines = text.replace(/^\uFEFF/, '').split(/\r?\n/).filter(line => line.trim() !== '');
  if(!lines.length) return [];
  const headers = parseCSVLine(lines[0]).map(h => normalize(h));
  return lines.slice(1).map(line => {
    const values = parseCSVLine(line);
    const row = {};
    headers.forEach((h, i) => row[h] = normalize(values[i] || ''));
    return row;
  });
}

async function loadUsers(){
  const res = await fetch(CSV_URL, { cache: 'no-store' });
  if(!res.ok) throw new Error('Could not load Google Sheet data');
  const csv = await res.text();
  return parseCSV(csv);
}

async function handleLogin(){
  const username = lower(document.getElementById('username').value);
  const pin = normalize(document.getElementById('pin').value);
  if(!username || !pin){
    showMessage('Please enter both username and pin.');
    return;
  }
  try{
    showMessage('Checking credentials...', false);
    const users = await loadUsers();
    const user = users.find(u => lower(u.Username) === username && normalize(u.Pin) === pin);
    if(!user){
      showMessage('Invalid username or pin.');
      return;
    }
    sessionStorage.setItem(STORAGE_KEY, JSON.stringify(user));
    window.location.href = 'sarthi-dashboard-csv.html';
  }catch(err){
    console.error(err);
    showMessage('Unable to validate login right now.');
  }
}

document.getElementById('submitBtn').addEventListener('click', handleLogin);
document.getElementById('backBtn').addEventListener('click', () => window.location.href = 'index.html');
document.getElementById('pin').addEventListener('keydown', e => { if(e.key === 'Enter') handleLogin(); });
document.getElementById('username').addEventListener('keydown', e => { if(e.key === 'Enter') handleLogin(); });
</script>
</body>
</html>
