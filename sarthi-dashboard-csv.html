<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="theme-color" content="#075E54"/>
<title>Sarthi Dashboard</title>
<style>
:root{--bg:#e5ddd5;--card:#fff;--line:#9cb4aa;--text:#17302b;--muted:#62756f;--btnbg:#dff5ed;}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.wrap{max-width:1040px;margin:0 auto;padding:42px 18px 40px;min-height:100vh}
.bubble{background:var(--card);border:2px solid var(--line);padding:18px 20px;max-width:620px;font-size:20px;line-height:1.45}
.toolbar{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;margin:22px 0 10px}
.crumbs{font-size:15px;font-weight:800;color:var(--muted)}
.userMeta{font-size:15px;font-weight:800;color:var(--muted)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:26px;padding:22px 0 34px}
.card{min-height:98px;border:2px solid #7f968d;border-radius:16px;background:var(--btnbg);padding:16px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;cursor:pointer;font-weight:900;font-size:20px;color:#29423c;box-shadow:0 2px 0 rgba(0,0,0,.05)}
.card small{display:block;font-size:13px;font-weight:700;color:#47615a;margin-top:6px;line-height:1.25}
.card.leaf{background:#edf8f4}
.actions{display:flex;justify-content:center;gap:26px;flex-wrap:wrap;margin-top:10px}
.btn{border:2px solid #7f968d;cursor:pointer;padding:16px 26px;border-radius:16px;font-weight:900;font-size:20px;color:#29423c;background:var(--btnbg);min-width:170px;box-shadow:0 2px 0 rgba(0,0,0,.05)}
.empty{margin-top:28px;background:#fff;border:2px dashed var(--line);padding:24px;border-radius:14px;text-align:center;color:#557069;font-weight:700}
.note{margin-top:10px;color:#557069;font-size:14px;font-weight:700}
@media (max-width:640px){
  .wrap{padding-top:30px}
  .bubble{font-size:18px}
  .grid{gap:18px}
  .card{font-size:18px;min-height:88px}
  .actions{gap:16px}
  .btn{min-width:140px;font-size:18px;padding:14px 22px}
}
</style>
</head>
<body>
  <div class="wrap">
    <div class="bubble">
      <strong>Get Ready for deep-dive!!</strong><br/><br/>
      <span id="promptText">Whom would you like to reach out Today?</span>
    </div>

    <div class="toolbar">
      <div id="breadcrumbs" class="crumbs"></div>
      <div id="userMeta" class="userMeta"></div>
    </div>

    <div id="grid" class="grid"></div>
    <div id="empty" class="empty" style="display:none"></div>

    <div class="actions">
      <button class="btn" id="levelBackBtn">Back</button>
      <button class="btn" id="logoutBtn">Logout</button>
    </div>
    <div class="note">Tap any box to dive deeper. Advisors are the last level for this phase.</div>
  </div>
<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQrLaHbMvunnTS67OlQTh0RhUjIHzQGzTLNnmdxJQR6ERhFXpSmJ00LbtDxwfa-OQq-YeA6gckOUzgH/pub?gid=0&single=true&output=csv';
const STORAGE_KEY = 'sarthiCurrentUser';
let USERS = [];
let currentUser = null;
let stack = [];

const levelMap = {
  'Admin': 'Zonal Heads',
  'Channel Head': 'Zonal Heads',
  'Zonal Head': 'Regional Heads',
  'Regional Head': 'Territory Managers',
  'Territory Manager': 'Advisors',
  'Advisor': 'Advisors'
};

function normalize(v){ return String(v || '').trim(); }
function lower(v){ return normalize(v).toLowerCase(); }

function parseCSVLine(line){
  const out = [];
  let cur = '';
  let inQuotes = false;
  for(let i=0;i<line.length;i++){
    const ch = line[i];
    if(ch === '"'){
      if(inQuotes && line[i+1] === '"'){
        cur += '"';
        i++;
      } else {
        inQuotes = !inQuotes;
      }
    } else if(ch === ',' && !inQuotes){
      out.push(cur);
      cur = '';
    } else {
      cur += ch;
    }
  }
  out.push(cur);
  return out;
}

function parseCSV(text){
  const lines = text.replace(/^\uFEFF/, '').split(/\r?\n/).filter(line => line.trim() !== '');
  if(!lines.length) return [];
  const headers = parseCSVLine(lines[0]).map(h => normalize(h));
  return lines.slice(1).map(line => {
    const values = parseCSVLine(line);
    const row = {};
    headers.forEach((h, i) => row[h] = normalize(values[i] || ''));
    return row;
  });
}

async function loadUsers(){
  const res = await fetch(CSV_URL, { cache: 'no-store' });
  if(!res.ok) throw new Error('Could not load Google Sheet data');
  const csv = await res.text();
  return parseCSV(csv);
}

function getRoleLabel(user){ return normalize(user.Role) || 'Advisor'; }

function getDirectReports(user){
  const uid = normalize(user.UserID);
  if(getRoleLabel(user) === 'Admin'){
    const channelHeads = USERS.filter(u => getRoleLabel(u) === 'Channel Head');
    const chIds = new Set(channelHeads.map(u => normalize(u.UserID)));
    return USERS.filter(u => chIds.has(normalize(u.ReportsToID)));
  }
  return USERS.filter(u => normalize(u.ReportsToID) === uid);
}

function sortByName(list){
  return [...list].sort((a,b) => normalize(a.Name).localeCompare(normalize(b.Name)));
}

function render(){
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  const promptText = document.getElementById('promptText');
  const breadcrumbs = document.getElementById('breadcrumbs');
  const currentNode = stack[stack.length - 1];
  const reports = sortByName(getDirectReports(currentNode));
  const nextLevel = levelMap[getRoleLabel(currentNode)] || 'Team';

  document.getElementById('userMeta').textContent = `${normalize(currentUser.Name)} • ${getRoleLabel(currentUser)}`;
  promptText.textContent = `Whom would you like to reach out Today? Browse ${nextLevel.toLowerCase()} under ${normalize(currentNode.Name)}.`;
  breadcrumbs.textContent = stack.map(n => normalize(n.Name)).join('  ›  ');
  grid.innerHTML = '';

  if(!reports.length){
    empty.style.display = 'block';
    empty.textContent = `${normalize(currentNode.Name)} has no further reportees available here.`;
    return;
  }
  empty.style.display = 'none';

  for(const person of reports){
    const hasChildren = getDirectReports(person).length > 0;
    const card = document.createElement('button');
    card.className = 'card' + (hasChildren ? '' : ' leaf');
    card.innerHTML = `<span>${normalize(person.Name)}</span><small>${getRoleLabel(person)}</small>`;
    card.addEventListener('click', () => {
      stack.push(person);
      render();
    });
    grid.appendChild(card);
  }
}

async function init(){
  const raw = sessionStorage.getItem(STORAGE_KEY);
  if(!raw){
    window.location.href = 'sarthi-login-csv.html';
    return;
  }
  currentUser = JSON.parse(raw);
  USERS = await loadUsers();
  const refreshed = USERS.find(u => lower(u.Username) === lower(currentUser.Username) && normalize(u.Pin) === normalize(currentUser.Pin));
  if(refreshed){
    currentUser = refreshed;
    sessionStorage.setItem(STORAGE_KEY, JSON.stringify(refreshed));
  }
  stack = [currentUser];
  render();
}

document.getElementById('levelBackBtn').addEventListener('click', () => {
  if(stack.length > 1){
    stack.pop();
    render();
  } else {
    window.location.href = 'index.html';
  }
});

document.getElementById('logoutBtn').addEventListener('click', () => {
  sessionStorage.removeItem(STORAGE_KEY);
  window.location.href = 'sarthi-login-csv.html';
});

init().catch(err => {
  console.error(err);
  document.getElementById('grid').innerHTML = '';
  const empty = document.getElementById('empty');
  empty.style.display = 'block';
  empty.textContent = 'Unable to load hierarchy right now.';
});
</script>
</body>
</html>
