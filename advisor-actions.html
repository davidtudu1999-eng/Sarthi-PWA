<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta name="theme-color" content="#075E54"/>
  <title>Sarthi Advisor Page</title>
  <style>
    :root{
      --wa:#075E54;
      --bg:#e5ddd5;
      --card:#ffffff;
      --btn1:#d8eee4;
      --btnBorder:#8ea598;
      --text:#1f2d2a;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
    }
    .header{
      position:fixed;top:0;left:0;right:0;z-index:3000;
      background:var(--wa);color:#fff;padding:20px;font-weight:900;font-size:26px;
    }
    .wrap{
      padding-top:110px;
      max-width:900px;
      margin:0 auto;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      gap:34px;
      padding-left:18px;
      padding-right:18px;
    }
    .nameCard{
      margin-top:22px;
      background:var(--card);
      border:2px solid var(--btnBorder);
      border-radius:22px;
      min-width:320px;
      max-width:100%;
      padding:26px 24px;
      text-align:center;
      font-size:20px;
      font-weight:800;
      box-shadow:0 1px 0 rgba(0,0,0,.04);
    }
    .grid{
      width:100%;
      display:grid;
      grid-template-columns:repeat(3,minmax(170px,1fr));
      gap:26px 34px;
      align-items:center;
      justify-items:center;
      margin-top:8px;
    }
    .grid.bottom{
      grid-template-columns:repeat(2,minmax(170px,1fr));
      max-width:470px;
      margin-bottom:30px;
    }
    .actionBtn{
      width:100%;
      max-width:250px;
      border:2px solid var(--btnBorder);
      border-radius:18px;
      background:var(--btn1);
      color:var(--text);
      font-weight:800;
      font-size:18px;
      padding:18px 14px;
      cursor:pointer;
      box-shadow:0 4px 0 rgba(0,0,0,.06);
    }
    .actionBtn:active{
      transform:translateY(1px);
      box-shadow:0 3px 0 rgba(0,0,0,.06);
    }
    .hint{
      font-size:14px;
      opacity:.75;
      margin-top:-18px;
      text-align:center;
    }
    @media (max-width: 760px){
      .grid{
        grid-template-columns:1fr;
        max-width:320px;
      }
      .grid.bottom{
        grid-template-columns:1fr;
        max-width:320px;
      }
      .nameCard{
        min-width:0;
        width:100%;
      }
    }
  </style>
</head>
<body>
  <div class="header">Akash at your Service</div>

  <div class="wrap">
    <div id="advisorName" class="nameCard">Advisor Name</div>

    <div class="grid">
      <button id="goalSettingBtn" class="actionBtn">Goal Setting</button>
      <button id="callBtn" class="actionBtn">Call</button>
      <button id="dailyTrackingBtn" class="actionBtn">Daily Tracking</button>
    </div>

    <div class="grid bottom">
      <button id="backBtn" class="actionBtn">Back</button>
      <button id="advisorListBtn" class="actionBtn">Advisor's List</button>
    </div>

    <div class="hint">Advisor name is read automatically from the page link.</div>
  </div>

  <script>
const API_URL = localStorage.getItem("SCRIPT_URL") || "https://script.google.com/macros/s/AKfycbxZ9Kpu0wpj8ONHE4FTOmeHigxt_wdhh3K97RWXTQ8mqjz9Hl6Er-iXJff-qu62kMtZHw/exec";

const params = new URLSearchParams(window.location.search);
const advisorName = params.get("name") || params.get("advisorName") || "Advisor Name";
const advisorId = params.get("userId") || params.get("advisorId") || "";
const userName = params.get("userName") || params.get("managerName") || sessionStorage.getItem("userName") || localStorage.getItem("userName") || "";

document.getElementById("advisorName").textContent = advisorName;

function buildAdvisorUrl(page) {
  const url = new URL(page, window.location.href);
  url.searchParams.set("name", advisorName);
  if (advisorId) url.searchParams.set("advisorId", advisorId);
  if (userName) url.searchParams.set("userName", userName);
  return url.toString();
}

async function apiGet(payload) {
  const url = API_URL + "?" + new URLSearchParams(payload).toString();
  const res = await fetch(url, { method: "GET" });
  if (!res.ok) throw new Error("Network error");
  return JSON.parse(await res.text());
}

document.getElementById("goalSettingBtn").addEventListener("click", () => {
  window.location.href = buildAdvisorUrl("goal-setting.html");
});

document.getElementById("dailyTrackingBtn").addEventListener("click", () => {
  window.location.href = buildAdvisorUrl("daily-tracking.html");
});

document.getElementById("callBtn").addEventListener("click", async () => {
  try {
    const result = await apiGet({
      action: "getAdvisorPhone",
      advisorName: advisorName
    });
    if (!result.ok || !result.phone) {
      alert(result.message || "Unable to fetch phone number.");
      return;
    }
    const phone = String(result.phone).trim();

    try {
      await navigator.clipboard.writeText(phone);
    } catch (e) {
      const ta = document.createElement("textarea");
      ta.value = phone;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      ta.remove();
    }

    try {
      await apiGet({
        action: "logCall",
        advisorName: advisorName,
        phone: phone,
        userName: userName,
        details: "Dialer opened"
      });
    } catch (e) {}

    if (confirm("Number copied. Open Dialer?")) {
      window.location.href = "tel:" + phone;
    }
  } catch (e) {
    alert("Unable to fetch phone number.");
  }
});

document.getElementById("backBtn").addEventListener("click", () => {
  history.back();
});

document.getElementById("advisorListBtn").addEventListener("click", () => {
  history.back();
});

window.SARTHI_ADVISOR_CONTEXT = { advisorName, advisorId, userName };
</script>
</body>
</html>
