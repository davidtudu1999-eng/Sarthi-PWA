<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Tracking</title>
  <style>
    :root {
      --bg: #eee7df;
      --mint: #dce8d2;
      --mint-border: #5b6b58;
      --text: #1f2b2a;
      --white: #ffffff;
      --shadow: rgba(0,0,0,0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .page {
      max-width: 980px;
      margin: 0 auto;
      padding: 28px 18px 40px;
    }
    .panel {
      background: #f3ebe2;
      border-radius: 8px;
      padding: 26px 24px 30px;
      box-shadow: 0 2px 8px var(--shadow);
    }
    .advisor-box {
      width: 240px;
      max-width: 100%;
      margin: 0 auto 26px;
      background: var(--white);
      border: 2px solid #2f3937;
      border-radius: 18px;
      text-align: center;
      padding: 12px 12px 10px;
      line-height: 1.35;
      font-weight: 700;
    }
    .advisor-name {
      font-size: 1.15rem;
      margin-bottom: 8px;
    }
    .metric-name {
      font-size: 1.1rem;
    }
    .question-box {
      background: var(--white);
      border: 2px solid #2f3937;
      min-height: 90px;
      padding: 18px 16px;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      margin-bottom: 28px;
    }
    .bubble-row {
      display: grid;
      grid-template-columns: repeat(11, minmax(46px, 1fr));
      gap: 10px;
      margin-bottom: 24px;
    }
    .bubble {
      border: 2px solid var(--mint-border);
      background: var(--mint);
      color: var(--text);
      border-radius: 999px;
      aspect-ratio: 1 / 1;
      min-height: 46px;
      font-size: 1.1rem;
      cursor: pointer;
      font-weight: 600;
    }
    .bubble.active {
      background: #b9d7a7;
      box-shadow: inset 0 0 0 2px #3d5a35;
    }
    .manual-input {
      width: 100%;
      height: 56px;
      border: 2px solid #2f3937;
      background: var(--white);
      padding: 0 14px;
      font-size: 1.05rem;
      margin-bottom: 26px;
    }
    .btn-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 18px;
    }
    .btn {
      min-width: 170px;
      padding: 14px 20px;
      border: 2px solid #586755;
      border-radius: 12px;
      background: var(--mint);
      color: var(--text);
      font-size: 1.15rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 6px 0 rgba(0,0,0,0.08);
    }
    .hint {
      text-align: center;
      margin-top: 14px;
      color: #5d6663;
      font-size: 0.95rem;
    }
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 1000;
    }
    .overlay.show { display: flex; }
    .modal {
      width: min(460px, 100%);
      background: #fff;
      border-radius: 18px;
      padding: 26px 22px 22px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.22);
      text-align: center;
    }
    .modal h2 {
      margin: 0 0 10px;
      font-size: 1.5rem;
    }
    .modal p {
      margin: 0 0 22px;
      font-size: 1.05rem;
      line-height: 1.45;
    }
    @media (max-width: 760px) {
      .page { padding: 16px 12px 28px; }
      .panel { padding: 18px 14px 22px; }
      .advisor-box { width: 210px; }
      .question-box { font-size: 1.05rem; min-height: 82px; }
      .bubble-row { grid-template-columns: repeat(4, 1fr); }
      .btn { min-width: 140px; font-size: 1rem; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="panel">
      <div class="advisor-box">
        <div id="advisorName" class="advisor-name">Advisor Name</div>
        <div id="metricName" class="metric-name">Leads</div>
      </div>

      <div id="questionBox" class="question-box">1. Leads for the day?</div>
      <div id="bubbleRow" class="bubble-row"></div>
      <input id="manualInput" class="manual-input" type="number" min="0" step="1" placeholder="You can type the number here" />

      <div class="btn-row">
        <button id="submitBtn" class="btn">Submit</button>
        <button id="backBtn" class="btn">Back</button>
        <button id="advisorListBtn" class="btn">Advisor’s List</button>
      </div>

      <div class="hint">Tap a circle for quick entry, or type any number above 10 below.</div>
    </div>
  </div>

  <div id="doneOverlay" class="overlay">
    <div class="modal">
      <h2>Activities Logged In</h2>
      <p>Do you want to see updated status?</p>
      <div class="btn-row">
        <button id="yesBtn" class="btn">Yes</button>
        <button id="noBtn" class="btn">No</button>
      </div>
    </div>
  </div>

  <script>
const API_URL = localStorage.getItem("SCRIPT_URL") || "https://script.google.com/macros/s/AKfycbxZ9Kpu0wpj8ONHE4FTOmeHigxt_wdhh3K97RWXTQ8mqjz9Hl6Er-iXJff-qu62kMtZHw/exec";

    const steps = [
      { key: 'leads', title: 'Leads', question: '1. Leads for the day?' },
      { key: 'calls', title: 'Calls', question: '2. Calls for the day?' },
      { key: 'meetingsScheduled', title: 'Meetings Scheduled', question: '3. Meetings Scheduled for the day?' },
      { key: 'meetingsDone', title: 'Meetings Done', question: '4. Meetings done for the day?' },
      { key: 'logins', title: 'Logins', question: '5. Logins for the day?' }
    ];

    const params = new URLSearchParams(window.location.search);
    const advisorName = params.get('name') || "Advisor's Name";

    const state = {
      currentStep: 0,
      values: {
        leads: '',
        calls: '',
        meetingsScheduled: '',
        meetingsDone: '',
        logins: ''
      }
    };

    const advisorNameEl = document.getElementById('advisorName');
    const metricNameEl = document.getElementById('metricName');
    const questionBoxEl = document.getElementById('questionBox');
    const bubbleRowEl = document.getElementById('bubbleRow');
    const manualInputEl = document.getElementById('manualInput');
    const doneOverlayEl = document.getElementById('doneOverlay');

    advisorNameEl.textContent = advisorName;

    function renderBubbles(selectedValue) {
      bubbleRowEl.innerHTML = '';
      for (let i = 0; i <= 10; i += 1) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'bubble';
        btn.textContent = i;
        if (String(selectedValue) === String(i)) {
          btn.classList.add('active');
        }
        btn.addEventListener('click', () => {
          manualInputEl.value = i;
          render();
        });
        bubbleRowEl.appendChild(btn);
      }
    }

    function render() {
      const step = steps[state.currentStep];
      const savedValue = state.values[step.key];
      metricNameEl.textContent = step.title;
      questionBoxEl.textContent = step.question;
      manualInputEl.value = savedValue;
      renderBubbles(savedValue);
    }

    function sanitizeValue(value) {
      if (value === '' || value === null || value === undefined) return '0';
      const n = Number(value);
      if (!Number.isFinite(n) || n < 0) return '0';
      return String(Math.floor(n));
    }

    manualInputEl.addEventListener('input', () => {
      const step = steps[state.currentStep];
      state.values[step.key] = manualInputEl.value;
      renderBubbles(manualInputEl.value);
    });

    document.getElementById('submitBtn').addEventListener('click', () => {
      const step = steps[state.currentStep];
      state.values[step.key] = sanitizeValue(manualInputEl.value);

      if (state.currentStep < steps.length - 1) {
        state.currentStep += 1;
        render();
        return;
      }
      doneOverlayEl.classList.add('show');
    });

    document.getElementById('backBtn').addEventListener('click', () => {
      if (state.currentStep > 0) {
        state.currentStep -= 1;
        render();
        return;
      }
      window.history.back();
    });

    document.getElementById('advisorListBtn').addEventListener('click', () => {
      window.location.href = 'sarthi-dashboard-appscript.html';
    });

    document.getElementById('noBtn').addEventListener('click', () => {
      window.location.href = 'sarthi-dashboard-appscript.html';
    });

    document.getElementById('yesBtn').addEventListener('click', () => {
      doneOverlayEl.classList.remove('show');
    });

    render();
  </script>
</body>
</html>
